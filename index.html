<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代买订单管理系统</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'PingFang SC', sans-serif; background: #f5f5f7; padding: 20px; }
.container { max-width: 1200px; margin: 0 auto; }
header { background: white; padding: 20px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; }
h1 { font-size: 22px; color: #1d1d1f; }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
.stat { background: white; padding: 20px; border-radius: 16px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.stat .num { font-size: 28px; font-weight: 700; color: #007aff; }
.stat .label { font-size: 12px; color: #86868b; margin-top: 6px; }
table { width: 100%; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
th { background: #007aff; color: white; padding: 16px; text-align: left; font-size: 14px; }
td { padding: 14px 16px; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
tr:hover { background: #f8f9ff; }
tr:last-child td { border-bottom: none; }
.badge { padding: 4px 12px; border-radius: 12px; font-size: 12px; display: inline-block; }
.badge-待处理 { background: #fff3cd; color: #856404; }
.badge-已下单 { background: #cce5ff; color: #004085; }
.badge-已发货 { background: #d4edda; color: #155724; }
.badge-已完成 { background: #f3e5f5; color: #7b1fa2; }
.badge-待收货 { background: #fff3cd; color: #856404; }
.search { margin-bottom: 16px; }
.search input { width: 100%; padding: 14px 18px; border: 1px solid #e5e5ea; border-radius: 12px; font-size: 15px; background: white; }
.search input:focus { outline: none; border-color: #007aff; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📦 代买订单管理系统</h1>
    <span style="font-size:12px;color:#86868b">共 <span id="count">0</span> 笔订单</span>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="num" id="totalCost">¥0</div>
      <div class="label">总花费</div>
    </div>
    <div class="stat">
      <div class="num" id="totalCharge">¥0</div>
      <div class="label">总实收</div>
    </div>
    <div class="stat">
      <div class="num" id="totalProfit">¥0</div>
      <div class="label">总利润</div>
    </div>
    <div class="stat">
      <div class="num" id="pendingCount">0</div>
      <div class="label">待处理</div>
    </div>
  </div>

  <div class="search">
    <input type="text" id="searchInput" placeholder="搜索客户/商品/快递..." oninput="renderOrders()">
  </div>

  <table>
    <thead>
      <tr>
        <th>日期</th>
        <th>客户</th>
        <th>商品</th>
        <th>花费</th>
        <th>实收</th>
        <th>利润</th>
        <th>快递</th>
        <th>状态</th>
      </tr>
    </thead>
    <tbody id="orderList"></tbody>
  </table>
</div>

<script>
const orders = [
  { id: '2034', name: '罗姗姗', phone: '180****9129', address: '广东省深圳市南山区西丽街道深圳职业技术大学西丽湖园区格物园E座2005', product: '捷安玺防水厨房秤【全防水】防水秤升级两用计数款10kg/1g【带托盘+背光+送礼包】 x1', cost: 49.90, charge: 39.90, status: '已发货', tracking: '圆通 YT7612173643205', note: '优惠¥10.00', date: '2026-04-01' }
];

function renderOrders() {
  const keyword = document.getElementById('searchInput').value.toLowerCase();
  const filtered = orders.filter(o =>
    !keyword || o.name.includes(keyword) || o.product.includes(keyword) || (o.tracking && o.tracking.toLowerCase().includes(keyword))
  );

  document.getElementById('count').textContent = filtered.length;
  const totalCost = filtered.reduce((s, o) => s + o.cost, 0);
  const totalCharge = filtered.reduce((s, o) => s + (o.charge || 0), 0);
  const totalProfit = totalCharge - totalCost;
  const pending = filtered.filter(o => o.status === '待处理' || o.status === '待收货').length;

  document.getElementById('totalCost').textContent = '¥' + totalCost.toFixed(0);
  document.getElementById('totalCharge').textContent = '¥' + totalCharge.toFixed(0);
  document.getElementById('totalProfit').textContent = '¥' + totalProfit.toFixed(0);
  document.getElementById('pendingCount').textContent = pending;

  document.getElementById('orderList').innerHTML = filtered.map(o => {
    const profit = (o.charge || 0) - o.cost;
    return `<tr>
      <td>${o.date}</td>
      <td>${o.name}<br><small style="color:#86868b">${o.phone}</small></td>
      <td>${o.product}</td>
      <td>¥${o.cost.toFixed(2)}</td>
      <td>¥${(o.charge || 0).toFixed(2)}</td>
      <td style="color:${profit >= 0 ? '#34c759' : '#ff3b30'}">¥${profit.toFixed(2)}</td>
      <td>${o.tracking || '-'}</td>
      <td><span class="badge badge-${o.status}">${o.status}</span></td>
    </tr>`;
  }).join('');
}

renderOrders();
</script>
</body>
</html>
